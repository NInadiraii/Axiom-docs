# Render.com infrastructure-as-code for the Speed-to-Lead bots.
# Push this file to GitHub and connect your repo at render.com/new
# to get a one-click deploy with all env vars pre-configured.

services:
  # ── Facebook Messenger bot (primary) ──────────────────────────
  - type: web
    name: fb-lead-bot
    env: python
    plan: free                          # Upgrade to "starter" for always-on
    buildCommand: pip install -r requirements_fb.txt
    startCommand: uvicorn fb_lead_bot:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      # ── Facebook ─────────────────────────────────────────────
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false                     # Set manually in Render dashboard
      - key: FB_VERIFY_TOKEN
        sync: false

      # ── Email ────────────────────────────────────────────────
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false

      # ── Telegram ─────────────────────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

  # ── LINE bot (secondary — deploy separately if needed) ────────
  - type: web
    name: line-lead-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements_line.txt
    startCommand: uvicorn line_lead_bot:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
